<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stronger in 30 — Dashboard</title>
  <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQEAYAAABPYyMiAAAABmJLR0T///////8JWPfcAAAACXBIWXMAAABIAAAASABGyWs+AAAAF0lEQVRIx2NgGAWjYBSMglEwCkbBSAcACAABAAGiyb5fAAAAAElFTkSuQmCC">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --white: #ffffff;
      --bg: #fafaf8;
      --ink: #1a1a1a;
      --border: #e8e6e0;
      --accent-red: #ef4444;
      --accent-purple: #7c3aed;
      --accent-cyan: #0891b2;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .tab-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      gap: 0;
      padding: 0 24px;
      min-height: 60px;
    }

    .tab-button {
      padding: 16px 28px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      color: #8a8a8a;
      border-bottom: 3px solid transparent;
      transition: all 0.25s ease;
      white-space: nowrap;
      position: relative;
    }

    .tab-button:hover {
      color: var(--ink);
    }

    .tab-button.active {
      color: var(--ink);
      font-weight: 600;
    }

    .tab-button.active.red {
      border-bottom-color: var(--accent-red);
    }

    .tab-button.active.purple {
      border-bottom-color: var(--accent-purple);
    }

    .tab-button.active.cyan {
      border-bottom-color: var(--accent-cyan);
    }

    .tab-content {
      flex: 1;
      overflow: hidden;
      display: none;
      position: relative;
      width: 100%;
      height: calc(100vh - 120px); /* Full height minus header and tab bar */
    }

    .tab-content.active {
      display: block;
    }

    .tab-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--white);
      overflow: hidden;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      zoom: 1;
      transform: scale(1);
    }

    /* Loading state removed */

    .dashboard-header {
      text-align: center;
      padding: 16px 24px;
      background: linear-gradient(135deg, #f9f9f7 0%, #fafaf8 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .dashboard-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .dashboard-subtitle {
      font-size: 12px;
      color: #8a8a8a;
      letter-spacing: 0.05em;
    }

    .refresh-indicator {
      position: absolute;
      top: 50%;
      right: 24px;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #8a8a8a;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .refresh-indicator.show {
      opacity: 1;
    }

    .refresh-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid #e8e6e0;
      border-top: 2px solid var(--accent-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .tab-button {
        padding: 16px 16px;
        font-size: 13px;
      }

      .dashboard-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="dashboard-header">
      <div class="dashboard-title">Stronger in 30</div>
      <div class="dashboard-subtitle">Select a difficulty level to view the challenge board</div>
      <div style="position: absolute; right: 24px; top: 50%; transform: translateY(-50%);">
        <button onclick="openExportModal()" style="font-size: 11px; font-weight: 600; letter-spacing: 0.06em; background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); color: white; border: none; border-radius: 6px; padding: 8px 14px; cursor: pointer; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; transition: background 0.15s; box-shadow: 0 2px 6px rgba(139, 92, 246, 0.3);">📊 Export Levels</button>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-button active red" data-tab="beginner">Beginner</button>
      <button class="tab-button purple" data-tab="intermediate">Intermediate</button>
      <button class="tab-button cyan" data-tab="advanced">Advanced</button>
    </div>

    <div class="tab-content active" id="beginner">
      <iframe class="tab-iframe" src="./stronger-in-30-beginner.html" loading="eager"></iframe>
    </div>

    <div class="tab-content" id="intermediate">
      <iframe class="tab-iframe" src="./stronger-in-30-intermediate.html" loading="eager"></iframe>
    </div>

    <div class="tab-content" id="advanced">
      <iframe class="tab-iframe" src="./stronger-in-30-advanced.html" loading="eager"></iframe>
    </div>
  </div>

  <!-- Export Modal -->
  <div id="export-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
    <div style="background: white; border-radius: 12px; padding: 32px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-size: 20px; font-weight: 600; color: #1a1a1a;">Export Options</h2>
        <button onclick="closeExportModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #888;">✕</button>
      </div>
      
      <div style="margin-bottom: 24px;">
        <h3 style="font-size: 14px; font-weight: 600; color: #333; margin-bottom: 12px;">Select Locations</h3>
        <div id="location-checkboxes" style="display: grid; gap: 8px;">
          <!-- Location checkboxes will be populated dynamically -->
        </div>
        <div style="margin-top: 10px;">
          <button onclick="selectAllLocations()" style="background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer; margin-right: 8px;">Select All</button>
          <button onclick="deselectAllLocations()" style="background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer;">Deselect All</button>
        </div>
      </div>
      
      <div style="margin-bottom: 24px;">
        <h3 style="font-size: 14px; font-weight: 600; color: #333; margin-bottom: 12px;">Filter Options</h3>
        <label style="display: flex; align-items: center; margin-bottom: 8px; cursor: pointer;">
          <input type="radio" name="filter-type" value="all" checked style="margin-right: 8px; cursor: pointer;">
          <span>All Members</span>
        </label>
        <label style="display: flex; align-items: center; margin-bottom: 8px; cursor: pointer;">
          <input type="radio" name="filter-type" value="qualified" style="margin-right: 8px; cursor: pointer;">
          <span>Qualified Members Only</span>
        </label>
        <label style="display: flex; align-items: center; cursor: pointer;">
          <input type="radio" name="filter-type" value="not-qualified" style="margin-right: 8px; cursor: pointer;">
          <span>Not Qualified Members Only</span>
        </label>
      </div>
      
      <div style="display: flex; justify-content: space-between; gap: 12px;">
        <button onclick="exportSelectedData('csv')" style="flex: 1; background: #22c55e; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: 600;">Export CSV</button>
        <button onclick="exportSelectedData('pdf')" style="flex: 1; background: #ef4444; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: 600;">Export PDF</button>
      </div>
    </div>
  </div>

  <script src="export-utils.js"></script>
  <script>
    const tabButtons = document.querySelectorAll('.tab-button');
    const tabContents = document.querySelectorAll('.tab-content');

    // Tab switching — show/hide only, never reload iframes
    tabButtons.forEach(button => {
      button.addEventListener('click', () => {
        const tabName = button.getAttribute('data-tab');
        tabButtons.forEach(btn => btn.classList.remove('active'));
        tabContents.forEach(content => content.classList.remove('active'));
        button.classList.add('active');
        document.getElementById(tabName).classList.add('active');
      });
    });

    // Keyboard shortcuts (Cmd/Ctrl + 1/2/3)
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey || e.metaKey) {
        switch (e.key) {
          case '1': e.preventDefault(); tabButtons[0].click(); break;
          case '2': e.preventDefault(); tabButtons[1].click(); break;
          case '3': e.preventDefault(); tabButtons[2].click(); break;
        }
      }
    });

    // ── UNIFIED EXPORT FUNCTIONALITY ──
    let cachedStats = [];

    function openExportModal() {
      // Collect and cache stats first
      cachedStats = collectAllStats();
      
      if (cachedStats.length === 0) {
        alert('No data available. Please ensure all levels have loaded.');
        return;
      }

      // Get unique locations
      const locations = [...new Set(cachedStats.map(s => s.location))].sort();
      
      // Populate location checkboxes
      const container = document.getElementById('location-checkboxes');
      container.innerHTML = locations.map(location => 
        `<label style="display: flex; align-items: center; cursor: pointer;">
          <input type="checkbox" value="${location}" checked style="margin-right: 8px; cursor: pointer;">
          <span>${location}</span>
        </label>`
      ).join('');
      
      // Show modal
      document.getElementById('export-modal').style.display = 'flex';
    }

    function closeExportModal() {
      document.getElementById('export-modal').style.display = 'none';
    }

    function selectAllLocations() {
      const checkboxes = document.querySelectorAll('#location-checkboxes input[type="checkbox"]');
      checkboxes.forEach(cb => cb.checked = true);
    }

    function deselectAllLocations() {
      const checkboxes = document.querySelectorAll('#location-checkboxes input[type="checkbox"]');
      checkboxes.forEach(cb => cb.checked = false);
    }

    function collectAllStats() {
      const allStats = [];
      
      try {
        // Get iframes
        const iframes = document.querySelectorAll('.tab-iframe');
        if (iframes.length < 3) return [];

        // Get Beginner stats
        if (iframes[0].contentWindow && iframes[0].contentWindow.getBeginnerStats) {
          const beginnerStats = iframes[0].contentWindow.getBeginnerStats();
          allStats.push(...beginnerStats);
        }

        // Get Intermediate stats
        if (iframes[1].contentWindow && iframes[1].contentWindow.getIntermediateStats) {
          const intermediateStats = iframes[1].contentWindow.getIntermediateStats();
          allStats.push(...intermediateStats);
        }

        // Get Advanced stats
        if (iframes[2].contentWindow && iframes[2].contentWindow.getAdvancedStats) {
          const advancedStats = iframes[2].contentWindow.getAdvancedStats();
          allStats.push(...advancedStats);
        }
      } catch (error) {
        console.warn('Error collecting stats:', error);
      }

      return allStats;
    }

    function exportSelectedData(format) {
      // Get selected locations
      const locationCheckboxes = document.querySelectorAll('#location-checkboxes input[type="checkbox"]:checked');
      const selectedLocations = Array.from(locationCheckboxes).map(cb => cb.value);
      
      if (selectedLocations.length === 0) {
        alert('Please select at least one location to export.');
        return;
      }

      // Get filter type
      const filterType = document.querySelector('input[name="filter-type"]:checked').value;
      
      // Filter stats based on selections
      let filteredStats = cachedStats.filter(s => selectedLocations.includes(s.location));
      
      if (filterType === 'qualified') {
        filteredStats = filteredStats.filter(s => s.fullyQualified);
      } else if (filterType === 'not-qualified') {
        filteredStats = filteredStats.filter(s => !s.fullyQualified);
      }
      
      if (filteredStats.length === 0) {
        alert('No data matches your selected criteria.');
        return;
      }

      // Close modal
      closeExportModal();
      
      // Export based on format
      try {
        if (format === 'csv') {
          downloadUnifiedCSV(filteredStats);
        } else {
          generateUnifiedPDF(filteredStats);
        }
      } catch (error) {
        console.error('Export failed:', error);
        alert('Export failed: ' + error.message);
      }
    }

    function aggregateAndExportAllLevels() {
      try {
        // Get iframes
        const iframes = document.querySelectorAll('.tab-iframe');
        if (iframes.length < 3) {
          alert('Error: Not all level pages loaded');
          return;
        }

        // Collect stats from each level
        const allStats = [];
        
        try {
          // Get Beginner stats
          if (iframes[0].contentWindow && iframes[0].contentWindow.getBeginnerStats) {
            const beginnerStats = iframes[0].contentWindow.getBeginnerStats();
            allStats.push(...beginnerStats);
          }
        } catch (e) {
          console.warn('Failed to get Beginner stats:', e);
        }

        try {
          // Get Intermediate stats
          if (iframes[1].contentWindow && iframes[1].contentWindow.getIntermediateStats) {
            const intermediateStats = iframes[1].contentWindow.getIntermediateStats();
            allStats.push(...intermediateStats);
          }
        } catch (e) {
          console.warn('Failed to get Intermediate stats:', e);
        }

        try {
          // Get Advanced stats
          if (iframes[2].contentWindow && iframes[2].contentWindow.getAdvancedStats) {
            const advancedStats = iframes[2].contentWindow.getAdvancedStats();
            allStats.push(...advancedStats);
          }
        } catch (e) {
          console.warn('Failed to get Advanced stats:', e);
        }

        if (allStats.length === 0) {
          alert('No data available. Please ensure all levels have loaded.');
          return;
        }

        // Ask user for export format
        const format = confirm('Select export format:\nOK = CSV | Cancel = PDF');
        
        if (format) {
          // CSV Export
          downloadUnifiedCSV(allStats);
        } else {
          // PDF Export
          generateUnifiedPDF(allStats);
        }
      } catch (error) {
        console.error('Export failed:', error);
        alert('Export failed: ' + error.message);
      }
    }

    // Make functions globally available
    window.aggregateAndExportAllLevels = aggregateAndExportAllLevels;
    window.openExportModal = openExportModal;
    window.closeExportModal = closeExportModal;
    window.selectAllLocations = selectAllLocations;
    window.deselectAllLocations = deselectAllLocations;
    window.exportSelectedData = exportSelectedData;

    // Close modal when clicking outside
    document.getElementById('export-modal').addEventListener('click', (e) => {
      if (e.target.id === 'export-modal') {
        closeExportModal();
      }
    });
  </script>
</body>
</html>
